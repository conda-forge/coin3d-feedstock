# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: coin3d
  version: "4.0.8"
  superglue_version: "1.3.0"

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  - url: https://github.com/coin3d/coin/archive/refs/tags/v${{ version }}.tar.gz
    sha256: bfc293bd3fe67a4835c8f373a0c838e22eb2c565db8d57b9c745db86e57c7969
    # patches:
    #   - patches/0001-Only-use-GLX-on-platforms-with-X11.patch

  - url: https://github.com/coin3d/superglu/archive/superglu-${{ superglue_version }}.tar.gz
    sha256: f408adcfb706e7c781db9c218ef9e8ba56d43995ccb61dffad5f6154c34f17d6
    target_directory: superglue
    patches:
      - patches/0002-superglue.patch

build:
  number: 1

requirements:
  run_exports:
    - ${{ pin_subpackage(name, upper_bound='x.x') }}
  build:
    - if: unix
      then:
        - gnuconfig
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - ninja
  host:
    - if: linux
      then:
        - libgl-devel
        - libglu
        - xorg-libxt
        - xorg-libxi
    - expat
  run:
    - if: linux
      then:
        - libglu
        - xorg-libxt
        - xorg-libxi
    - expat

tests:
  - if: linux
    then:
      script:
        - ${CXX} -o test test.cpp -Wl,-rpath-link -lCoin -L${PREFIX}/lib/ -I${PREFIX}/include/
        - ./test
      files:
        recipe:
          - test.cpp
      requirements:
        build:
          - ${{ compiler('c') }}
          - ${{ compiler('cxx') }}
  - if: win
    then:
      script:
        - where /r "%PREFIX%" Coin4.dll
  - if: osx
    then:
      script:
        - test -f ${PREFIX}/lib/libCoin.dylib

about:
  homepage: https://bitbucket.org/Coin3D/coin/wiki/Home
  license: BSD-3-Clause
  license_family: BSD
  license_file: COPYING
  summary: Coin3D is a C++ high-level 3D graphics toolkit.
  description: Coin3D is a high-level, retained-mode toolkit for effective 3D graphics development. It is API compatible with Open Inventor 2.1.
  documentation: https://bitbucket.org/Coin3D/coin/wiki/Home
  repository: https://bitbucket.org/Coin3D/coin/wiki/Home

extra:
  recipe-maintainers:
    - oursland
    - looooo
